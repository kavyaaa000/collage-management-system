# STORE CONFIGURATION (College Connect)
store:
  image:
    upload:
      path: /uploads/store
  max:
    file:
      size: 5MB
  receipt:
    generate:
      pdf: true

# FILE STORAGE CONFIGURATION
file:
  upload:
    dir: ./uploads/documents
  upload-dir: ./uploads
  allowed-extensions: pdf
  storage:
    location: uploads/
    max-file-size: 10485760 # 10MB in bytes

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  level:
    root: INFO
    com.college: DEBUG
    com.collegeconnect: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/college-erp-unified.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# =============================================================================
# ACTUATOR CONFIGURATION
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================
app:
  # College Information
  college:
    name: "Sri Venkateshwara College of Engineering"
    code: "SVCE"
  
  # Base URL
  base:
    url: http://localhost:3000

  # Academic Session
  academic:
    current-session-id: 25
    current-year: "2024-2025"
    current-semester: "ODD"

  # Attendance Rules
  attendance:
    min-percentage: 75
    grace-percentage: 65
    condonation-enabled: true

  # Exam Configuration
  exam:
    ia1-max-marks: 50
    ia2-max-marks: 50
    endsem-max-marks: 100
    ia1-weightage: 0.15
    ia2-weightage: 0.15
    endsem-weightage: 0.70
    passing-marks: 40

  # Email Configuration
  email:
    enabled: false
    from: noreply@college.edu

  # Notification Configuration
  notification:
    enabled: false
    channels:
      - EMAIL
      - SMS

# =============================================================================
# DEVELOPMENT PROFILE
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.college: DEBUG
    com.collegeconnect: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  expiration: 3600000 # 1 hour for development

security:
  cors:
    max-age: 0  # No caching in dev

# =============================================================================
# PRODUCTION PROFILE
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: WARN
    com.college: INFO
    com.collegeconnect: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

  file:
    name: /var/log/college-erp/application.log

jwt:
  expiration: 86400000 # 24 hours for production

security:
  password:
    encoder:
      strength: 12 # Higher security for production

server:
  error:
    include-stacktrace: never
    include-exception: false

# =============================================================================
# TEST PROFILE
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

logging:
  level:
    com.college: DEBUG
    com.collegeconnect: DEBUG