# =============================================================================
# UNIFIED COLLEGE ERP - COMMON CONFIGURATION
# =============================================================================
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# =============================================================================
# SPRING APPLICATION CONFIGURATION
# =============================================================================
spring:
  application:
    name: college-erp-unified

  # ===========================================================================
  # DATABASE CONFIGURATION - PRIMARY (Main ERP)
  # ===========================================================================
  datasource:
    url: jdbc:mysql://localhost:3306/college_db_analytics?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=false
    username: root
    password: kavi56
    driver-class-name: com.mysql.cj.jdbc.Driver

    # Connection Pool Configuration
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: CollegeERPHikariPool

  # ===========================================================================
  # JPA/HIBERNATE CONFIGURATION
  # ===========================================================================
  jpa:
    hibernate:
      ddl-auto: none  # Use 'update' only in development
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        enable_lazy_load_no_trans: false

  # ===========================================================================
  # MULTIPART FILE UPLOAD CONFIGURATION
  # ===========================================================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

  # ===========================================================================
  # JACKSON JSON CONFIGURATION
  # ===========================================================================
  jackson:
    serialization:
      indent-output: true
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: Asia/Kolkata

  # ===========================================================================
  # EMAIL CONFIGURATION
  # ===========================================================================
  mail:
    host: smtp.gmail.com
    port: 587
    username: kavikavismk@gmail.com
    password: bagc yzxz dflc pefv
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  # ===========================================================================
  # TASK EXECUTION
  # ===========================================================================
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100

