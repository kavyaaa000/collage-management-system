# =============================================================================
# JWT SECURITY CONFIGURATION
# =============================================================================
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in milliseconds
  header: Authorization
  prefix: "Bearer "

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
security:
  # Password encoding strength
  password:
    encoder:
      strength: 10

  # CORS Configuration - Unified for all modules
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:5173
      - http://localhost:5174
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  # Session Configuration
  session:
    creation-policy: STATELESS

# =============================================================================
# MODULE-SPECIFIC CONFIGURATIONS
# =============================================================================

# TIMETABLE GENERATOR CONFIGURATION
timetable:
  python:
    script:
      path: "D:/ADMIN CONTROL/Timetable Generator/db integrated/solver.py"
    executable: "D:\\ADMIN CONTROL\\Timetable Generator\\db integrated\\venv\\Scripts\\python.exe"
  output:
    directory: "D:/ADMIN CONTROL/Timetable Generator/db integrated"
  solver:
    time-limit: 300
